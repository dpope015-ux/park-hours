<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading...</div>
    <div id="epcot" class="hours-box">Loading...</div>
    <div id="hollywood" class="hours-box">Loading...</div>
    <div id="animal-kingdom" class="hours-box">Loading...</div>
    <div id="universal-studios" class="hours-box">Loading...</div>
    <div id="islands-adventure" class="hours-box">Loading...</div>
    <div id="epic-universe" class="hours-box">Loading...</div>

    <script>
        const rawSheetUrl = "https://google.com";
        const sheetCSVUrl = "https://corsproxy.io?" + encodeURIComponent(rawSheetUrl);

        async function fetchHours() {
            try {
                const response = await fetch(sheetCSVUrl);
                const csvText = await response.text();
                
                // Parses rows while safely clearing carriage return artifacts (\r)
                const rows = csvText.split("\n").map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim());
                });
                
                // Helper mapping database names to target DOM element IDs
                const mapping = {
                    "Magic Kingdom": "magic-kingdom",
                    "Epcot": "epcot",
                    "Hollywood Studios": "hollywood",
                    "Animal Kingdom": "animal-kingdom",
                    "Universal Studios Florida": "universal-studios",
                    "Islands of Adventure": "islands-adventure",
                    "Epic Universe": "epic-universe"
                };

                // Iterates through your rows and forces direct string printing of Column B
                rows.forEach(row => {
                    if (row.length >= 2) {
                        const parkName = row[0];
                        const parkHours = row[1];
                        const elementId = mapping[parkName];
                        if (elementId) {
                            document.getElementById(elementId).innerText = parkHours || "Closed";
                        }
                    }
                });
                
            } catch (error) {
                console.error("Error updating layout overlay:", error);
            }
        }

        fetchHours();
        setInterval(fetchHours, 600000);
    </script>
</body>
</html>

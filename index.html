<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading...</div>
    <div id="epcot" class="hours-box">Loading...</div>
    <div id="hollywood" class="hours-box">Loading...</div>
    <div id="animal-kingdom" class="hours-box">Loading...</div>
    <div id="universal-studios" class="hours-box">Loading...</div>
    <div id="islands-adventure" class="hours-box">Loading...</div>
    <div id="epic-universe" class="hours-box">Loading...</div>

    <script>
        const mapping = {
            "Magic Kingdom": "magic-kingdom",
            "Epcot": "epcot",
            "Hollywood Studios": "hollywood",
            "Animal Kingdom": "animal-kingdom",
            "Universal Studios Florida": "universal-studios",
            "Islands of Adventure": "islands-adventure",
            "Epic Universe": "epic-universe"
        };

        // FIXED: Explicitly processes row collections cleanly via object references to avoid text bugs
        window.drawVisualization = function(data) {
            try {
                if (!data || !data.table || !data.table.rows) return;
                
                data.table.rows.forEach(row => {
                    if (row && row.c && Array.isArray(row.c) && row.c.length >= 2) {
                        const cellA = row.c[0];
                        const cellB = row.c[1];
                        
                        if (cellA && cellB) {
                            const parkName = cellA.v;
                            const parkHours = cellB.v;
                            const targetId = mapping[parkName];
                            
                            if (targetId && parkHours) {
                                document.getElementById(targetId).innerText = parkHours;
                            }
                        }
                    }
                });
            } catch (err) {
                console.error("Mapping failure: ", err);
            }
        };

        function refreshData() {
            const oldScript = document.getElementById('google-sheet-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'google-sheet-script';
            
            // Connects cleanly to your live spreadsheet structure via JSONP streaming
            script.src = "https://google.com" + new Date().getTime();
            document.body.appendChild(script);
        }

        refreshData();
        setInterval(refreshData, 300000); // Check updates every 5 mins
    </script>
</body>
</html>

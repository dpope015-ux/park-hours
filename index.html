<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading Hours...</div>
    <div id="epcot" class="hours-box">Loading Hours...</div>
    <div id="hollywood" class="hours-box">Loading Hours...</div>
    <div id="animal-kingdom" class="hours-box">Loading Hours...</div>
    <div id="universal-studios" class="hours-box">Loading Hours...</div>
    <div id="islands-adventure" class="hours-box">Loading Hours...</div>
    <div id="epic-universe" class="hours-box">Loading Hours...</div>

    <script>
        // Mapping catalog to route layout data strings to their HTML screen targets
        const mapping = {
            "Magic Kingdom": "magic-kingdom",
            "Epcot": "epcot",
            "Hollywood Studios": "hollywood",
            "Animal Kingdom": "animal-kingdom",
            "Universal Studios Florida": "universal-studios",
            "Islands of Adventure": "islands-adventure",
            "Epic Universe": "epic-universe"
        };

        // FIXED: This global function catches data from Google's JSONP wrapper script, avoiding CORS errors
        window.drawVisualization = function(data) {
            try {
                if (!data || !data.table || !data.table.rows) return;
                
                data.table.rows.forEach(row => {
                    if (row && row.c && row.c[0] && row.c[1]) {
                        const parkName = row.c[0].v;
                        const parkHours = row.c[1].v;
                        const targetId = mapping[parkName];
                        
                        if (targetId && parkHours) {
                            document.getElementById(targetId).innerText = parkHours;
                        }
                    }
                });
            } catch (err) {
                console.error("Parsing error: ", err);
            }
        };

        function refreshData() {
            // Remove old script tag if it exists to clean up memory
            const oldScript = document.getElementById('google-sheet-script');
            if (oldScript) oldScript.remove();

            // FIXED: Appending a JSONP script request node bypasses CORS restrictions entirely
            const script = document.createElement('script');
            script.id = 'google-sheet-script';
            script.src = "https://google.com" + new Date().getTime();
            document.body.appendChild(script);
        }

        // Initialize script download immediately
        refreshData();
        // Check for calendar cell modifications every 10 minutes
        setInterval(refreshData, 600000);
    </script>
</body>
</html>

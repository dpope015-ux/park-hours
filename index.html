<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading...</div>
    <div id="epcot" class="hours-box">Loading...</div>
    <div id="hollywood" class="hours-box">Loading...</div>
    <div id="animal-kingdom" class="hours-box">Loading...</div>
    <div id="universal-studios" class="hours-box">Loading...</div>
    <div id="islands-adventure" class="hours-box">Loading...</div>
    <div id="epic-universe" class="hours-box">Loading...</div>

    <script>
        // FIXED: Explicitly extracted your spreadsheet key to access Google's table reader API directly
        const googleEndpoint = "https://google.com";

        async function fetchHours() {
            try {
                const response = await fetch(googleEndpoint);
                if (!response.ok) throw new Error("Google connection error");
                
                const rawText = await response.text();
                
                // Trims the security wrapper off Google's native JSON output
                const jsonStart = rawText.indexOf('{');
                const jsonEnd = rawText.lastIndexOf('}') + 1;
                const jsonString = rawText.substring(jsonStart, jsonEnd);
                
                const data = JSON.parse(jsonString);
                const rows = data.table.rows;
                
                const mapping = {
                    "Magic Kingdom": "magic-kingdom",
                    "Epcot": "epcot",
                    "Hollywood Studios": "hollywood",
                    "Animal Kingdom": "animal-kingdom",
                    "Universal Studios Florida": "universal-studios",
                    "Islands of Adventure": "islands-adventure",
                    "Epic Universe": "epic-universe"
                };

                rows.forEach(row => {
                    // Verifies that row contents contain active data cells
                    if (row && row.c && row.c[0] && row.c[1]) {
                        const parkName = row.c[0].v;
                        const parkHours = row.c[1].v;
                        const targetId = mapping[parkName];
                        
                        if (targetId && parkHours) {
                            document.getElementById(targetId).innerText = parkHours;
                        }
                    }
                });
                
            } catch (error) {
                console.error("Data pipeline broken:", error);
                const boxes = document.getElementsByClassName("hours-box");
                for (let box of boxes) {
                    box.innerText = "Error: " + error.message;
                }
            }
        }

        fetchHours();
        setInterval(fetchHours, 600000); // Check updates every 10 mins
    </script>
</body>
</html>

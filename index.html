<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading...</div>
    <div id="epcot" class="hours-box">Loading...</div>
    <div id="hollywood" class="hours-box">Loading...</div>
    <div id="animal-kingdom" class="hours-box">Loading...</div>
    <div id="universal-studios" class="hours-box">Loading...</div>
    <div id="islands-adventure" class="hours-box">Loading...</div>
    <div id="epic-universe" class="hours-box">Loading...</div>

    <script>
        // FIXED: Switched to Google's native visualization query engine endpoint to bypass CORS blocks entirely
        const googleQueryUrl = "https://google.com";

        async function fetchHours() {
            try {
                const response = await fetch(googleQueryUrl);
                const text = await response.text();
                
                // Cleans up the Google API wrapper text to isolate pure JSON objects
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                // Safe parsing dictionary mapping the spreadsheet cells to your HTML screen IDs
                const mapping = {
                    "Magic Kingdom": "magic-kingdom",
                    "Epcot": "epcot",
                    "Hollywood Studios": "hollywood",
                    "Animal Kingdom": "animal-kingdom",
                    "Universal Studios Florida": "universal-studios",
                    "Islands of Adventure": "islands-adventure",
                    "Epic Universe": "epic-universe"
                };

                rows.forEach(row => {
                    if (row.c && row.c[0] && row.c[1]) {
                        const parkName = row.c[0].v;
                        const parkHours = row.c[1].v;
                        const elementId = mapping[parkName];
                        if (elementId) {
                            document.getElementById(elementId).innerText = parkHours ? parkHours : "Closed";
                        }
                    }
                });
                
            } catch (error) {
                console.error("Error fetching rows from layout matrix:", error);
            }
        }

        fetchHours();
        setInterval(fetchHours, 600000); // Refreshes text parameters automatically every 10 minutes
    </script>
</body>
</html>

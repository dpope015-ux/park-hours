<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theme Park Live Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden; 
            width: 1920px;
            height: 1080px;
        }
        .hours-box { 
            position: absolute; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            text-align: center;
            width: 300px;
        }
        
        /* ADJUST THESE NUMBERS TO LINE UP THE TEXT PERFECTLY UNDER YOUR GRAPHICS */
        #magic-kingdom   { top: 150px; left: 100px; }
        #epcot           { top: 150px; left: 450px; }
        #hollywood       { top: 150px; left: 800px; }
        #animal-kingdom  { top: 450px; left: 100px; }
        #universal-studios{ top: 450px; left: 450px; }
        #islands-adventure{ top: 450px; left: 800px; }
        #epic-universe   { top: 750px; left: 450px; }
    </style>
</head>
<body>
    <div id="magic-kingdom" class="hours-box">Loading...</div>
    <div id="epcot" class="hours-box">Loading...</div>
    <div id="hollywood" class="hours-box">Loading...</div>
    <div id="animal-kingdom" class="hours-box">Loading...</div>
    <div id="universal-studios" class="hours-box">Loading...</div>
    <div id="islands-adventure" class="hours-box">Loading...</div>
    <div id="epic-universe" class="hours-box">Loading...</div>

    <script>
        // Formulate the CSV stream URL using your custom Sheet ID string
        const sheetCSVUrl = "https://google.com";
        const proxyUrl = "https://corsproxy.io" + encodeURIComponent(sheetCSVUrl);

        async function fetchHours() {
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("HTTP connection error: " + response.status);
                
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                
                const mapping = {
                    "Magic Kingdom": "magic-kingdom",
                    "Epcot": "epcot",
                    "Hollywood Studios": "hollywood",
                    "Animal Kingdom": "animal-kingdom",
                    "Universal Studios Florida": "universal-studios",
                    "Islands of Adventure": "islands-adventure",
                    "Epic Universe": "epic-universe"
                };

                let successfullyParsed = false;

                lines.forEach(line => {
                    // Split row elements by commas and drop surrounding quote marks
                    const columns = line.split(",").map(c => c.replace(/"/g, '').trim());
                    
                    if (columns.length >= 2) {
                        // FIXED: Uses structural array destructuring to assign row text safely
                        const [parkName, parkHours] = columns;
                        const elementId = mapping[parkName];
                        
                        if (elementId && parkHours) {
                            document.getElementById(elementId).innerText = parkHours;
                            successfullyParsed = true;
                        }
                    }
                });

                if (!successfullyParsed) {
                    throw new Error("No matching theme park row keys identified in CSV data payload.");
                }
                
            } catch (error) {
                console.error("Pipeline failure:", error);
                // Displays the real, unedited error string if anything fails
                const boxes = document.getElementsByClassName("hours-box");
                for (let box of boxes) {
                    box.innerText = "Error: " + error.message;
                }
            }
        }

        fetchHours();
        setInterval(fetchHours, 600000); // Poll sheet values every 10 minutes
    </script>
</body>
</html>
